name: Build & Deploy

on:
  push:
    branches: [master]

env:
  HUGO_VERSION: "0.158.0"
  PANDOC_VERSION: "3.9.0.2"
  TYPST_VERSION: "0.14.2"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # needed for git log date in CV footer

      - name: Install Hugo
        run: |
          curl -sSL "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz" \
            | sudo tar xz -C /usr/local/bin hugo

      - name: Install pandoc
        run: |
          curl -sSL "https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-linux-amd64.tar.gz" \
            | sudo tar xz --strip-components=1 -C /usr/local

      - name: Install typst
        run: |
          curl -sSL "https://github.com/typst/typst/releases/download/v${TYPST_VERSION}/typst-x86_64-unknown-linux-musl.tar.xz" \
            | sudo tar xJ --strip-components=1 -C /usr/local/bin

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: false

      - name: Generate publications.json
        run: uv run --with 'bibtexparser>=2.0.0b7' .github/scripts/bib2json.py

      - name: Build site
        run: hugo

      - name: Build CV PDF
        run: |
          pandoc \
            --from markdown+smart+yaml_metadata_block+definition_lists \
            --to typst \
            --template=themes/researcher/cv-pdf/cv.template.typ \
            --standalone \
            --variable=git-date:"$(git log -1 --format=%cs HEAD)" \
            --output public/cv/cv.typ \
            public/cv/cv.md
          typst compile --font-path themes/researcher/cv-pdf/fonts public/cv/cv.typ public/cv/cv.pdf
          rm public/cv/cv.typ

      - uses: oven-sh/setup-bun@v2

      - name: Deploy to Cloudflare Pages
        run: bunx wrangler pages deploy public --project-name=adamaltmejd
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
