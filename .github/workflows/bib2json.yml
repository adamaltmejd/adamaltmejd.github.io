name: Update publications.json

on:
  push:
    branches: [master]
    paths:
      - publications.bib

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bib2json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: false

      - name: Generate publications.json
        run: uv run --with 'bibtexparser>=2.0.0b7' .github/scripts/bib2json.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/publications.json
          git diff --staged --quiet && echo "No changes" || (git commit -m "Update publications.json from bib" && git push)
